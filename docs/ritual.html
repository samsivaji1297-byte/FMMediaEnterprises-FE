<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support This Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --fg: #f5f5f5;
    --muted: #b8bcc7;
    --accent: #ffffff;
    --glow: rgba(255,255,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0d11;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--fg);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* FOG LAYERS */
  .fog {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 60%);
    filter: blur(80px);
    animation: fogMove 22s ease-in-out infinite;
    opacity: 0.35;
  }

  @keyframes fogMove {
    0% { transform: translate(-20%, -10%) scale(1); }
    50% { transform: translate(10%, 10%) scale(1.2); }
    100% { transform: translate(-20%, -10%) scale(1); }
  }

  /* PARTICLES */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0.7;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* CARD */
  .card {
    position: relative;
    width: 92%;
    max-width: 420px;
    padding: 40px 32px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    backdrop-filter: blur(18px);
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeIn 1.6s ease;
    z-index: 10;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    text-transform: uppercase;
    text-shadow: 0 0 18px var(--glow);
  }

  p {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* CTA BUTTON */
  .button {
    display: inline-block;
    padding: 16px 38px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.25);
    background: linear-gradient(
      to bottom right,
      rgba(255,255,255,0.14),
      rgba(255,255,255,0.05)
    );
    color: var(--accent);
    text-decoration: none;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: 0.35s ease;
  }

  .button:hover {
    transform: scale(1.08) translateY(-3px);
    border-color: rgba(255,255,255,0.45);
    box-shadow: 0 0 28px rgba(255,255,255,0.25);
  }

  .button::before {
    content: "";
    position: absolute;
    top: 0; left: -120%;
    width: 120%;
    height: 100%;
    background: linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.45),
      transparent
    );
    transform: skewX(-20deg);
    transition: 0.6s ease;
  }

  .button:hover::before {
    left: 120%;
  }
</style>
</head>

<body>

<div class="fog"></div>

<div class="particles" id="particles"></div>

<div class="card">
  <h1>Support This Project</h1>
  <p>Your contribution fuels ongoing development and expansion.</p>

  <a class="button" href="https://paypal.me/saminthansivaji" target="_blank" onclick="startAmbience()">
    Donate via PayPal
  </a>
</div>

<script>
  /* PARTICLE GENERATION */
  const container = document.getElementById("particles");
  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = 8 + Math.random() * 12 + "s";
    p.style.animationDelay = Math.random() * -20 + "s";
    container.appendChild(p);
  }

  /* PROCEDURAL AMBIENT SOUND */
  let audioStarted = false;

  function startAmbience() {
    if (audioStarted) return;
    audioStarted = true;

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 48; /* low hum */
    gain.gain.value = 0.0008; /* extremely soft */

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
  }
</script>

</body>
</html>
