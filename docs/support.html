<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support This Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg1: #0f1117;
    --bg2: #1a1d27;
    --fg: #f5f5f5;
    --muted: #9aa0b2;
    --accent: #ffffff;
    --glow: rgba(255,255,255,0.18);
    --glass: rgba(255,255,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(circle at 50% 0%, var(--bg2), var(--bg1) 70%);
    font-family: "Inter", system-ui, sans-serif;
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* HOLOGRAPHIC ORB BACKGROUND */
  .orb {
    position: absolute;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 60%);
    filter: blur(40px);
    animation: float 9s ease-in-out infinite;
    opacity: 0.35;
  }

  @keyframes float {
    0% { transform: translate(-40px, -20px) scale(1); }
    50% { transform: translate(40px, 20px) scale(1.15); }
    100% { transform: translate(-40px, -20px) scale(1); }
  }

  /* CARD */
  .card {
    position: relative;
    width: 92%;
    max-width: 420px;
    padding: 40px 32px;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    animation: fadeIn 1.4s ease;
    text-align: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
    text-transform: uppercase;
    text-shadow: 0 0 12px var(--glow);
  }

  p {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* HOLOGRAPHIC BUTTON */
  .button {
    display: inline-block;
    padding: 14px 34px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.22);
    background: linear-gradient(
      to bottom right,
      rgba(255,255,255,0.12),
      rgba(255,255,255,0.04)
    );
    color: var(--accent);
    text-decoration: none;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: 0.35s ease;
  }

  /* HOLOGRAPHIC SHIMMER */
  .button::before {
    content: "";
    position: absolute;
    top: 0; left: -120%;
    width: 120%;
    height: 100%;
    background: linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.35),
      transparent
    );
    transform: skewX(-20deg);
    transition: 0.6s ease;
  }

  .button:hover::before {
    left: 120%;
  }

  /* WARP DISTORTION ON HOVER */
  .button:hover {
    transform: scale(1.06) translateY(-2px);
    border-color: rgba(255,255,255,0.45);
    box-shadow: 0 0 22px rgba(255,255,255,0.18);
  }

  /* SUBTLE GRID OVERLAY */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    opacity: 0.4;
  }

</style>
</head>

<body>

<div class="orb"></div>
<div class="grid"></div>

<div class="card">
  <h1>Support This Project</h1>
  <p>Your contribution helps keep development active and evolving.</p>

  <a class="button" href="https://paypal.me/saminthansivaji" target="_blank">
    Donate via PayPal
  </a>
</div>

</body>
</html>
