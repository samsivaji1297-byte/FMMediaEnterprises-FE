name: Render Reel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"   # 9AM AEDT
    - cron: "0 1 * * *"    # 12PM AEDT
    - cron: "0 4 * * *"    # 3PM AEDT
    - cron: "0 7 * * *"    # 6PM AEDT
    - cron: "0 10 * * *"   # 9PM AEDT

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pillow

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build reel input from repo content
        run: |
          python scripts/build_reel_input.py

      - name: Run renderer
        run: |
          python engine/render_text_video.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output/videos/*.mp4

      - name: Email video to phone
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "New Reel Rendered"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: ${{ secrets.GMAIL_ADDRESS }}
          body: "Your new reel is attached."
          attachments: output/videos/post.mp4
